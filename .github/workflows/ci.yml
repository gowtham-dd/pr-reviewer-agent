name: CI/CD Pipeline

on:
  push:
    branches: [ main, Testing ]
  pull_request:
    branches: [ main, Testing ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx pytest

      - name: Run Tests
        run: |
          pytest
